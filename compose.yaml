services:
  app:
    build:
      context: .
      target: runtime
    env_file:
      - .env
    environment:
      ACC_DATABASE_URL: sqlite:////app/data/app.db
      ACC_DATA_DIR: /app/data
      ACC_ENVIRONMENT: production
      ACC_ANKI_CONNECT_URL: http://127.0.0.1:8765
    network_mode: host
    volumes:
      - app-data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - >-
          import json, os, urllib.request;
          host = os.environ.get('ACC_HOST', '127.0.0.1');
          port = os.environ.get('ACC_PORT', '8000');
          response = urllib.request.urlopen(f'http://{host}:{port}/api/health', timeout=2);
          assert response.status == 200;
          assert json.load(response)['status'] == 'ok'
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  test:
    profiles: ["test"]
    build:
      context: .
      target: test
    environment:
      ACC_ENVIRONMENT: test
    command: ["uv", "run", "pytest", "--cov", "--cov-report=term-missing"]

volumes:
  app-data:
